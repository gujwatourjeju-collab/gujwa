<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>구좌마을여행사협동조합</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
/* ═══ RESET & ROOT ═══ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:#0d1614;color:#e8f4f3;font-size:14px;-webkit-font-smoothing:antialiased}

:root{
  --tl:#00b5b0;--tld:#009490;--tldd:#007a76;--tll:rgba(0,181,176,.12);--tlm:rgba(0,181,176,.25);
  --dk:#0d1614;--dk2:#131c1a;--dk3:#1a2624;--dk4:#212e2c;
  --lt:#e8f4f3;--lt2:#b8d4d2;--lt3:#7aadaa;--lt4:#4a8a87;
  --ok:#10b981;--okl:rgba(16,185,129,.15);
  --wa:#f59e0b;--wal:rgba(245,158,11,.15);
  --er:#ef4444;--erl:rgba(239,68,68,.15);
  --pu:#8b5cf6;--pul:rgba(139,92,246,.15);
  --pk:#ec4899;--pkl:rgba(236,72,153,.15);
  --r:14px;--rs:8px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

/* ═══ SCREENS ═══ */
.screen{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden;background:var(--dk)}
.screen.active{display:flex}

/* ═══ LOGIN SCREEN ═══ */
#s-login{background:linear-gradient(160deg,#0d2420 0%,#0d1614 50%,#091210 100%);align-items:center;justify-content:center}
.login-wrap{width:100%;max-width:380px;padding:24px 20px;display:flex;flex-direction:column;align-items:center;gap:0}
.login-logo{width:110px;height:90px;object-fit:contain;margin-bottom:16px;filter:brightness(1.1)}
.login-brand{text-align:center;margin-bottom:32px}
.login-brand h1{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.5px;line-height:1.3}
.login-brand p{font-size:11px;color:var(--tl);margin-top:5px;font-weight:600;letter-spacing:.8px}
.login-form{width:100%;background:var(--dk3);border-radius:20px;padding:24px 20px;border:1px solid rgba(0,181,176,.15);box-shadow:0 20px 60px rgba(0,0,0,.4)}
.lf-title{font-size:13px;font-weight:700;color:var(--lt2);margin-bottom:18px;text-align:center;letter-spacing:.3px}
.lf-group{margin-bottom:14px}
.lf-label{font-size:11px;font-weight:600;color:var(--lt3);display:block;margin-bottom:6px;letter-spacing:.3px}
.lf-input{width:100%;background:var(--dk4);border:1.5px solid rgba(0,181,176,.2);border-radius:10px;padding:13px 14px;color:#fff;font-family:inherit;font-size:15px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.lf-input:focus{border-color:var(--tl);box-shadow:0 0 0 3px rgba(0,181,176,.12)}
.lf-input::placeholder{color:var(--lt4);font-size:13px}
.lf-btn{width:100%;background:var(--tl);color:#fff;border:none;border-radius:12px;padding:15px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;margin-top:6px;transition:all .15s;letter-spacing:-.3px;-webkit-appearance:none}
.lf-btn:active{background:var(--tld);transform:scale(.98)}
.lf-err{background:var(--erl);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 12px;font-size:12px;color:#f87171;margin-top:10px;text-align:center;display:none}

/* ═══ MAIN APP ═══ */
#s-app{background:var(--dk)}

/* TOP BAR */
.topbar{height:56px;background:var(--dk2);border-bottom:1px solid rgba(0,181,176,.1);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;position:relative}
.tb-logo{width:32px;height:26px;object-fit:contain}
.tb-title{flex:1;font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px}
.tb-sub{font-size:10px;color:var(--tl);display:block;font-weight:500;margin-top:1px}
.tb-user{display:flex;align-items:center;gap:7px;cursor:pointer}
.tb-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;border:2px solid rgba(0,181,176,.4)}
.tb-role{font-size:10px;color:var(--lt3);font-weight:600;text-align:right}

/* CONTENT AREA */
.app-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(80px + var(--safe-bottom))}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--dk2);border-top:1px solid rgba(0,181,176,.12);display:flex;padding-bottom:var(--safe-bottom);z-index:50}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;cursor:pointer;transition:all .15s;border:none;background:none;gap:4px;min-height:60px}
.bn-item .ic{font-size:20px;transition:transform .15s}
.bn-item .lb{font-size:10px;color:var(--lt4);font-weight:600;letter-spacing:-.2px;transition:color .15s}
.bn-item.on .ic{transform:scale(1.15)}
.bn-item.on .lb{color:var(--tl)}
.bn-item:active .ic{transform:scale(.9)}

/* PAGE HEADER */
.pg-head{padding:20px 16px 0;margin-bottom:16px}
.pg-title{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.5px}
.pg-sub{font-size:12px;color:var(--lt3);margin-top:3px}

/* CARDS */
.card{background:var(--dk3);border-radius:var(--r);border:1px solid rgba(0,181,176,.1);margin:0 16px 14px;overflow:hidden}
.card-head{padding:14px 16px 12px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:700;color:var(--lt);letter-spacing:-.2px}
.card-body{padding:16px}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:14px}
.stat-card{background:var(--dk3);border-radius:var(--r);padding:14px 16px;border:1px solid rgba(0,181,176,.1);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-tl::before{background:var(--tl)} .stat-ok::before{background:var(--ok)}
.stat-wa::before{background:var(--wa)} .stat-pu::before{background:var(--pu)}
.stat-pk::before{background:var(--pk)}
.stat-label{font-size:10px;color:var(--lt3);font-weight:600;letter-spacing:.3px;margin-bottom:8px}
.stat-val{font-size:24px;font-weight:900;line-height:1}
.stat-desc{font-size:10px;color:var(--lt4);margin-top:5px}

/* SHIFT TAGS */
.st{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap}
.stA{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.stB{background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid rgba(96,165,250,.25)}
.stC{background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.25)}
.stD{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.25)}
.stOFF{background:rgba(255,255,255,.06);color:var(--lt4);border:1px solid rgba(255,255,255,.08)}
.stLV{background:rgba(244,114,182,.12);color:#f472b6;border:1px solid rgba(244,114,182,.25)}

/* TABLES */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:rgba(0,181,176,.08);color:var(--lt3);font-weight:600;font-size:10px;padding:8px 10px;text-align:left;border-bottom:1px solid rgba(0,181,176,.12);white-space:nowrap;letter-spacing:.3px}
.tbl td{padding:10px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;color:var(--lt)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:active td{background:rgba(0,181,176,.05)}

/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.btl{background:var(--tll);color:var(--tl)} .bok{background:var(--okl);color:var(--ok)}
.bwa{background:var(--wal);color:var(--wa)} .ber{background:var(--erl);color:#f87171}
.bgr{background:rgba(255,255,255,.06);color:var(--lt3)}

/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
.c1{background:linear-gradient(135deg,#00b5b0,#009490)} 
.c2{background:linear-gradient(135deg,#0891b2,#0e7490)} 
.c3{background:linear-gradient(135deg,#7c3aed,#6d28d9)}
.c4{background:linear-gradient(135deg,#db2777,#be185d)} 
.c5{background:linear-gradient(135deg,#059669,#047857)} 
.c6{background:linear-gradient(135deg,#d97706,#b45309)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 16px;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;-webkit-appearance:none}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--tl);color:#fff}
.btn-p:active{background:var(--tld)}
.btn-g{background:var(--dk4);color:var(--lt2);border:1px solid rgba(255,255,255,.08)}
.btn-ok{background:rgba(16,185,129,.2);color:var(--ok);border:1px solid rgba(16,185,129,.3)}
.btn-er{background:rgba(239,68,68,.2);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:8px}
.btn-full{width:100%}

/* PROGRESS */
.prog{height:5px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden}
.pf{height:100%;border-radius:3px;background:var(--tl);transition:width .4s}

/* CHIPS */
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:14px;font-size:10px;background:rgba(255,255,255,.06);color:var(--lt3);font-weight:600}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.mo.open{display:flex;animation:fi .15s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.mo-box{background:var(--dk3);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:90vh;display:flex;flex-direction:column;animation:su .2s}
@keyframes su{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.mo-head{padding:16px 20px 14px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mo-title{font-size:15px;font-weight:700;color:#fff}
.mo-close{background:rgba(255,255,255,.08);border:none;color:var(--lt3);width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mo-body{padding:20px;overflow-y:auto;flex:1}
.mo-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.06);display:flex;gap:8px;flex-shrink:0;padding-bottom:calc(14px + var(--safe-bottom))}

/* FORM */
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--lt3);margin-bottom:6px;letter-spacing:.3px}
.fc{width:100%;background:var(--dk4);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:11px 13px;color:#fff;font-family:inherit;font-size:14px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.fc:focus{border-color:var(--tl);box-shadow:0 0 0 3px rgba(0,181,176,.1)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* INFO BOX */
.ib{background:rgba(0,181,176,.08);border-left:3px solid var(--tl);border-radius:0 8px 8px 0;padding:10px 12px;font-size:12px;color:var(--lt2)}

/* CALENDAR PERSONAL */
.pcal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.pcal-dh{text-align:center;font-size:10px;font-weight:700;padding:6px 0;color:var(--lt4)}
.pcal-cell{min-height:58px;border-radius:8px;padding:5px 4px 3px;background:var(--dk4);border:1px solid rgba(255,255,255,.05);cursor:pointer;transition:all .12s;overflow:visible;position:relative}
.pcal-cell.today{background:rgba(0,181,176,.12);border-color:var(--tl)}
.pcal-cell.other{background:transparent;border-color:transparent}
.pcal-cell.sun .pcal-n{color:#f87171}
.pcal-cell.sat .pcal-n{color:var(--tl)}
.pcal-n{font-size:12px;font-weight:600;margin-bottom:3px;color:var(--lt)}
.pcal-cell.today .pcal-n{color:var(--tl);font-weight:800}
.pcal-cell.off{background:rgba(107,114,128,.08);border-color:rgba(107,114,128,.12)}
.pcal-cell.off .pcal-n{color:#555;opacity:.5}
.pcal-cell.off>span{opacity:.5}
.pcal-cell.holiday{border-color:rgba(248,113,113,.3)}
.pcal-cell.holiday .pcal-n{color:#f87171!important;font-weight:800}
.evt-bar{height:16px;display:flex;align-items:center;margin-top:2px;font-size:7px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:16px;position:relative;z-index:1}

/* SCHEDULE ALL - horizontal scroll */
.sch-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 16px 16px}
.sch-tbl{border-collapse:collapse;min-width:700px}
.sch-tbl th{background:var(--dk4);color:var(--lt3);font-size:10px;font-weight:700;padding:7px 5px;text-align:center;border:1px solid rgba(255,255,255,.06);white-space:nowrap;min-width:32px;position:sticky;top:0;z-index:2}
.sch-tbl th.emp-th{text-align:left;padding:7px 10px;min-width:70px;background:var(--dk3);left:0;z-index:3}
.sch-tbl th.sun{color:#f87171} .sch-tbl th.sat{color:var(--tl)} .sch-tbl th.tdc{background:rgba(0,181,176,.2)!important;color:var(--tl)!important}
.sch-tbl td{border:1px solid rgba(255,255,255,.04);padding:4px 3px;text-align:center;vertical-align:middle}
.sch-tbl td.emp-td{text-align:left;padding:8px 10px;background:var(--dk3);position:sticky;left:0;z-index:1;border-right:1px solid rgba(0,181,176,.15)!important}
.sch-tbl td.tdc{background:rgba(0,181,176,.06)!important}
.sch-tbl td.shc{cursor:pointer} .sch-tbl td.shc:active{background:rgba(0,181,176,.12)!important}
.sch-tbl td.sum-row{background:rgba(255,255,255,.03);font-size:10px;font-weight:600;color:var(--lt3)}

/* PERSON SELECTOR */
.ps-row{display:flex;gap:8px;overflow-x:auto;padding:0 16px 2px;-webkit-overflow-scrolling:touch}
.ps-row::-webkit-scrollbar{display:none}
.ps-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .15s;padding:4px 2px}
.ps-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;border:2px solid transparent;transition:all .15s}
.ps-btn.on .ps-av{border-color:var(--tl);box-shadow:0 0 0 3px rgba(0,181,176,.2)}
.ps-name{font-size:10px;font-weight:600;color:var(--lt4);transition:color .15s;white-space:nowrap}
.ps-btn.on .ps-name{color:var(--tl)}

/* LIST ITEMS */
.list-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.04)}
.list-item:last-child{border-bottom:none}
.list-item:active{background:rgba(0,181,176,.05)}

/* TOAST */
#toast{position:fixed;top:72px;left:16px;right:16px;z-index:300;background:var(--dk3);color:#fff;padding:12px 16px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.4);display:none;border-left:3px solid var(--tl);text-align:center}
#toast.show{display:block;animation:su .18s}
#toast.tok{border-left-color:var(--ok)} #toast.terr{border-left-color:#ef4444}

/* MISC */
.sep{height:1px;background:rgba(255,255,255,.05);margin:0 16px}
.empty{text-align:center;padding:36px 20px;color:var(--lt4)}
.empty .ei{font-size:36px;margin-bottom:10px}
.empty p{font-size:12px}
.tl{color:var(--tl)} .ok{color:var(--ok)} .wa{color:var(--wa)} .er{color:#f87171}
.sec-label{font-size:10px;font-weight:700;color:var(--lt4);letter-spacing:.8px;padding:14px 16px 6px;text-transform:uppercase}
</style>
</head>
<body>
<!-- ═══ SCREENS ═══ -->

<!-- LOGIN -->
<div id="s-login" class="screen active">
  <div class="login-wrap">
    <img id="login-logo" src="logo.png" alt="logo" class="login-logo">
    <div class="login-brand">
      <h1>구좌마을여행사<br>협동조합</h1>
      <p>GOOD JOB! GUJWA!</p>
    </div>
    <div class="login-form">
      <div class="lf-title">근무 관리 시스템 로그인</div>
      <div class="lf-group">
        <label class="lf-label">아이디</label>
        <input class="lf-input" id="li-id" type="text" placeholder="아이디를 입력하세요" autocomplete="username" autocapitalize="none">
      </div>
      <div class="lf-group">
        <label class="lf-label">비밀번호</label>
        <input class="lf-input" id="li-pw" type="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
      </div>
      <button class="lf-btn" onclick="doLogin()">로그인</button>
      <div class="lf-err" id="li-err">아이디 또는 비밀번호가 올바르지 않습니다</div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="s-app" class="screen">
  <!-- TOP BAR -->
  <div class="topbar">
    <img id="app-logo" src="logo.png" alt="logo" class="tb-logo">
    <div style="flex:1;min-width:0">
      <div class="tb-title" id="tb-title">대시보드</div>
      <span class="tb-sub">구좌마을여행사협동조합</span>
    </div>
    <div class="tb-user" onclick="showUserMenu()">
      <div>
        <div class="tb-role" id="tb-role">관리자</div>
      </div>
      <div class="av tb-av" id="tb-av" style="width:32px;height:32px;font-size:12px"></div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="app-content" id="app-content"></div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<div id="toast"></div>

<!-- USER MENU MODAL -->
<div class="mo" id="mo-user" onclick="if(event.target===this)closeAllMo()">
  <div class="mo-box" style="border-radius:20px;max-height:auto;margin:16px">
    <div class="mo-head">
      <span class="mo-title">내 계정</span>
      <button class="mo-close" onclick="closeAllMo()">✕</button>
    </div>
    <div class="mo-body" id="mo-user-body" style="padding-bottom:30px"></div>
  </div>
</div>

<!-- GENERAL MODAL -->
<div class="mo" id="mo-gen" onclick="if(event.target===this)closeAllMo()">
  <div class="mo-box">
    <div class="mo-head">
      <span class="mo-title" id="mo-gen-title"></span>
      <button class="mo-close" onclick="closeAllMo()">✕</button>
    </div>
    <div class="mo-body" id="mo-gen-body"></div>
    <div class="mo-foot" id="mo-gen-foot"></div>
  </div>
</div>

function fmtDs(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

async function loadKrHolidays(){
  const years=[...new Set(Object.keys(RAW).map(mk=>mk.split('-')[0]))];
  if(!years.length)years.push(String(new Date().getFullYear()));
  KR_HOLIDAYS={};
  for(const yr of years){
    try{
      const resp=await fetch(`https://date.nager.at/api/v3/PublicHolidays/${yr}/KR`);
      const data=await resp.json();
      // 1) 공휴일 등록
      for(const h of data)KR_HOLIDAYS[h.date]=h.localName;
      // 2) 대체휴무 계산 (주말에 겹치는 공휴일 → 다음 평일)
      const sorted=[...data].sort((a,b)=>a.date.localeCompare(b.date));
      for(const h of sorted){
        const d=new Date(h.date+'T00:00:00');
        const dow=d.getDay();
        if(dow===0||dow===6){
          let sub=new Date(d);
          do{sub.setDate(sub.getDate()+1);}while(sub.getDay()===0||sub.getDay()===6||KR_HOLIDAYS[fmtDs(sub)]);
          KR_HOLIDAYS[fmtDs(sub)]=h.localName+' 대체휴무';
        }
      }
    }catch(e){console.error('Holiday API error:',e);}
  }
}

async function loadData(){
  const [empR,schR,evtR,lbR,lrR]=await Promise.all([
    sb.from('employees').select('*').order('id'),
    sb.from('schedules').select('*'),
    sb.from('events').select('*'),
    sb.from('leave_balances').select('*').order('employee_id'),
    sb.from('leave_requests').select('*').order('id'),
  ]);
  EMP=(empR.data||[]).map(e=>({id:e.id,n:e.name,av:e.avatar,c:e.color_class,pos:e.position}));
  RAW={};
  for(const s of(schR.data||[])){
    if(!RAW[s.month_key])RAW[s.month_key]={};
    if(!RAW[s.month_key][s.day])RAW[s.month_key][s.day]=new Array(EMP.length).fill('OFF');
    const ei=EMP.findIndex(e=>+e.id===+s.employee_id);
    if(ei>=0)RAW[s.month_key][s.day][ei]=s.site_code;
  }
  EVENTS={};
  for(const e of(evtR.data||[]))EVENTS[e.event_date]=e.event_name;
  LV3=EMP.map(emp=>{
    const lb=(lbR.data||[]).find(l=>+l.employee_id===+emp.id);
    return lb?{used:+lb.used,annual:+lb.annual}:{used:0,annual:10};
  });
  lvReqs=(lrR.data||[]).map(r=>({
    id:r.id,empId:r.employee_id,en:r.emp_name,type:r.leave_type,
    s:r.start_date,e:r.end_date,days:+r.days,r:r.reason,st:r.status,
    cr:(r.created_at||'').slice(0,10)
  }));
  await loadKrHolidays();
}

function getEvt(ds){return EVENTS[ds]||'';}
function getEvtMonth(mk){return Object.entries(EVENTS).filter(([d])=>d.startsWith(mk)).sort((a,b)=>a[0].localeCompare(b[0]));}

function getMonthOffInfo(mk){
  const [y,m]=mk.split('-');const last=new Date(+y,+m,0).getDate();
  let wkend=0,holiday=0,holNames=[];
  for(let d=1;d<=last;d++){
    const dow=new Date(+y,+m-1,d).getDay();
    const ds=`${mk}-${String(d).padStart(2,'0')}`;
    const hol=KR_HOLIDAYS[ds];
    if(dow===0||dow===6){
      wkend++;
      if(hol&&!holNames.includes(hol))holNames.push(hol);
    }else if(hol){
      holiday++;
      if(!holNames.includes(hol))holNames.push(hol);
    }
  }
  return {total:wkend+holiday,wkend,holiday,holNames};
}

const EVT_COLORS=['#f59e0b','#3b82f6','#10b981','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316'];
function evtColorIdx(name){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))&0x7fffffff;return h%EVT_COLORS.length;}
function getEvtSpanInfo(mk){
  const [y,m]=mk.split('-');const last=new Date(+y,+m,0).getDate();const info={};
  for(let d=1;d<=last;d++){
    const ds=`${mk}-${String(d).padStart(2,'0')}`;const ev=getEvt(ds);if(!ev)continue;
    const prevDs=d>1?`${mk}-${String(d-1).padStart(2,'0')}`:null;
    const nextDs=d<last?`${mk}-${String(d+1).padStart(2,'0')}`:null;
    const isStart=!prevDs||getEvt(prevDs)!==ev;
    const isEnd=!nextDs||getEvt(nextDs)!==ev;
    const dow=new Date(+y,+m-1,d).getDay();
    info[d]={name:ev,isRowStart:isStart||dow===0,isRowEnd:isEnd||dow===6,ci:evtColorIdx(ev)};
  }
  return info;
}
function evtBarHtml(ei){
  if(!ei)return '';
  const c=EVT_COLORS[ei.ci],bg=c+'26';
  const rL=ei.isRowStart?'4px':'0',rR=ei.isRowEnd?'4px':'0';
  const mL=ei.isRowStart?'0':'-5px',mR=ei.isRowEnd?'0':'-5px';
  const pL=ei.isRowStart?'4px':(ei.name&&ei.isRowStart?'4px':'0');

// ═══ LOGIN ═══════════════════════════════════
async function doLogin(){
  const id=document.getElementById('li-id').value.trim();
  const pw=document.getElementById('li-pw').value;
  const err=document.getElementById('li-err');
  if(!id||!pw){err.textContent='아이디/비밀번호를 입력하세요';err.style.display='block';setTimeout(()=>err.style.display='none',3000);return;}
  try{
    const{data,error}=await sb.auth.signInWithPassword({email:id+'@gujwa.local',password:pw});
    if(error){err.textContent='로그인 실패: '+error.message;err.style.display='block';document.getElementById('li-pw').value='';setTimeout(()=>err.style.display='none',5000);return;}
    const{data:prof,error:profErr}=await sb.from('profiles').select('*').eq('id',data.user.id).single();
    if(profErr||!prof){err.textContent='프로필 로드 실패: '+(profErr?profErr.message:'없음');err.style.display='block';return;}
    await loadData();
    curUser={id:prof.username,role:prof.role,name:prof.name,
      empIdx:prof.employee_id?EMP.findIndex(e=>+e.id===+prof.employee_id):null,
      av:prof.avatar,c:prof.color_class};
    err.style.display='none';
    document.getElementById('s-login').classList.remove('active');
    document.getElementById('s-app').classList.add('active');
    initApp();
  }catch(e){
    err.textContent='오류: '+e.message;err.style.display='block';
    console.error('Login error:',e);
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const li=document.getElementById('s-login');
    if(li.classList.contains('active')) doLogin();
  }
});

function initApp(){

function buildNav(){
  const nav = curUser.role==='admin'?NAV_ADMIN:NAV_EMP;

  el.innerHTML = nav.map(n=>`
    <button class="bn-item ${curPage===n.id?'on':''}" onclick="go('${n.id}')">

const PAGE_TITLES = {
  dash:'대시보드',sch:'근무 스케줄',leave:'연차 관리',stats:'통계',team:'팀원 현황',

let _prevPage='';
const NOW_MK=(()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;})();
function go(p){
  if(p!==_prevPage&&(p==='my-sch'||p==='sch'||p==='my-hist')){
    const months=Object.keys(RAW).sort();
    calMo=months.includes(NOW_MK)?NOW_MK:months[months.length-1]||NOW_MK;
  }
  _prevPage=p;
  curPage=p;
  buildNav();
  document.getElementById('tb-title').textContent = PAGE_TITLES[p]||p;
  const ct = document.getElementById('app-content');
  ct.scrollTop=0;
  const pages={dash:pgDash,sch:pgSch,leave:pgLeave,stats:pgStats,team:pgTeam,
    'my-home':pgMyHome,'my-sch':pgMySch,'my-leave':pgMyLeave,'my-hist':pgMyHist};
  ct.innerHTML = (pages[p]||(() => '<div class="empty"><p>준비중</p></div>'))();

  afterRender(p);
}

function renderSchAll(){
  const [y,m]=calMo.split('-');
  const last=new Date(+y,+m,0).getDate();
  let hdr=`<th class="emp-th">팀원</th>`;
  for(let d=1;d<=last;d++){
    const dow=new Date(+y,+m-1,d).getDay();
    const ds=`${calMo}-${String(d).padStart(2,'0')}`;
    const isT=ds===TODAY;
    const hol=KR_HOLIDAYS[ds];
    hdr+=`<th class="${dow===0||hol?'sun':dow===6?'sat':''}${isT?' tdc':''}"${hol?` title="${hol}"`:''} style="${hol?'color:#f87171':''}">${d}<br><span style="font-size:8px;font-weight:400">${DN[dow]}</span>${hol?`<br><span style="font-size:6px;font-weight:700;color:#f87171">${hol.length>3?hol.slice(0,3):hol}</span>`:''}</th>`;
  }
  hdr+=`<th>복</th><th>사</th><th>청</th><th>어</th><th>OFF</th>`;

  let rows='';
  EMP.forEach((emp,ei)=>{
    const cnt={A:0,B:0,C:0,D:0,OFF:0,연차:0};
    let cells='';
    for(let d=1;d<=last;d++){
      const s=gs(calMo,d,ei); cnt[s]=(cnt[s]||0)+1;
      const si=SITES[s]||SITES.OFF;
      const ds=`${calMo}-${String(d).padStart(2,'0')}`;
      cells+=`<td class="shc${ds===TODAY?' tdc':''}" onclick="editShift('${calMo}',${d},${ei})">
        <span style="font-size:9px;font-weight:700;color:${si.col}">${si.s}</span>
      </td>`;
    }
    rows+=`<tr>
      <td class="emp-td">
        <div style="display:flex;align-items:center;gap:5px">
          <div class="av ${emp.c}" style="width:20px;height:20px;font-size:8px">${emp.av}</div>
          <span style="font-size:11px;font-weight:600">${emp.n.slice(0,3)}</span>
        </div>
      </td>
      ${cells}
      <td class="sum-row">${cnt.A}</td><td class="sum-row">${cnt.B}</td>
      <td class="sum-row">${cnt.C}</td><td class="sum-row">${cnt.D}</td><td class="sum-row">${cnt.OFF}</td>
    </tr>`;
  });

  // 합계 행
  ['A','B','C','D'].forEach(k=>{
    let cells='';
    for(let d=1;d<=last;d++){
      let n=0; EMP.forEach((_,ei)=>{if(gs(calMo,d,ei)===k)n++;});
      const ds=`${calMo}-${String(d).padStart(2,'0')}`;
      cells+=`<td class="sum-row${ds===TODAY?' tdc':''}" style="font-size:9px;color:${SITES[k].col}">${n||'-'}</td>`;
    }
    rows+=`<tr><td class="emp-td" style="font-size:9px;color:var(--lt4)">${SITES[k].s}계</td>${cells}<td colspan="5"></td></tr>`;
  });

  return `<div class="sch-wrap"><table class="sch-tbl"><thead><tr>${hdr}</tr></thead><tbody>${rows}</tbody></table></div>
    <div style="padding:0 16px;font-size:10px;color:var(--lt4)">💡 셀 탭하면 배치 변경</div>
    <div style="height:16px"></div>`;
}

function renderEmpCal(ei){
  const [y,m]=calMo.split('-');

  const cnt={A:0,B:0,C:0,D:0,OFF:0,연차:0};

  const evSpan=getEvtSpanInfo(calMo);
  let cells='';
  for(let i=0;i<first.getDay();i++) cells+=`<div class="pcal-cell other"></div>`;
  for(let d=1;d<=last;d++){
    const date=new Date(+y,+m-1,d);
    const ds=`${calMo}-${String(d).padStart(2,'0')}`;
    const s=gs(calMo,d,ei); const si=SITES[s]||SITES.OFF;
    const isT=ds===TODAY, dow=date.getDay();
    const isOff=s==='OFF'||s==='연차';
    const hol=KR_HOLIDAYS[ds];
    const isHol=!!hol;
    cells+=`<div class="pcal-cell${isT?' today':''}${dow===0?' sun':dow===6?' sat':''}${isOff?' off':''}${isHol?' holiday':''}">
      <div class="pcal-n"${isHol?' style="color:#f87171"':''}>${d}</div>
      <span style="font-size:9px;font-weight:700;color:${si.col}">${si.s}</span>
      ${isHol?`<div style="font-size:7px;color:#f87171;font-weight:700;line-height:1.1;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${hol.replace(' 대체휴무','(대)')}</div>`:''}
      ${evtBarHtml(evSpan[d])}
    </div>`;
  }

  const emp=EMP[ei];
  const offInfo=getMonthOffInfo(calMo);
  return `
    <div style="padding:0 16px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="av ${emp.c}" style="width:36px;height:36px;font-size:14px">${emp.av}</div>
        <div>
          <div style="font-size:15px;font-weight:800">${emp.n}</div>
          <div style="font-size:11px;color:var(--lt4)">${calMo.replace('2026-','26년 ')}월</div>
        </div>
        <div style="margin-left:auto;display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">
          ${Object.entries(cnt).filter(([,v])=>v>0).map(([k,v])=>`<span style="font-size:10px;font-weight:700;color:${(SITES[k]||SITES.OFF).col}">${(SITES[k]||SITES.OFF).s} ${v}</span>`).join('  ')}
        </div>
      </div>

async function appLv(id,ok){
  const r=lvReqs.find(x=>x.id===id);
  if(!r) return;
  const newSt=ok?'approved':'rejected';
  const{error}=await sb.from('leave_requests').update({status:newSt}).eq('id',id);
  if(error){toast('❌ 처리 실패','terr');return;}
  r.st=newSt;
  if(ok){
    const ei=EMP.findIndex(e=>e.id===r.empId);
    if(ei>=0&&LV3[ei]){
      LV3[ei].used+=r.days;
      await sb.from('leave_balances').update({used:LV3[ei].used}).eq('employee_id',r.empId).eq('year',2026);
    }
  }
  toast(ok?'✅ 연차가 승인되었습니다':'❌ 연차가 반려되었습니다',ok?'tok':'terr');
  go(curPage);
}

async function saveShift(mk,day,ei){
  const site=document.getElementById('sh-site').value;
  const empId=EMP[ei].id;
  const{error}=await sb.from('schedules').upsert({month_key:mk,day:+day,employee_id:empId,site_code:site},{onConflict:'month_key,day,employee_id'});
  if(error){toast('❌ 저장 실패: '+error.message,'terr');return;}
  if(!RAW[mk])RAW[mk]={};
  if(!RAW[mk][day])RAW[mk][day]=EMP.map(()=>'OFF');
  RAW[mk][day][ei]=site;
  closeAllMo(); toast('✅ 배치가 저장되었습니다','tok'); go(curPage);
}

function confirmDeleteMonth(){

  const mk=calMo;

       <strong>${mk}</strong> 스케줄을 완전히 삭제합니다.<br>이 작업은 되돌릴 수 없습니다.

async function deleteMonth(mk){
  const{error}=await sb.from('schedules').delete().eq('month_key',mk);
  if(error){toast('❌ 삭제 실패: '+error.message,'terr');return;}
  delete RAW[mk];
  const months=Object.keys(RAW).sort();
  calMo=months[months.length-1]||'2026-03';
  closeAllMo();
  toast('🗑 '+mk+' 스케줄이 삭제되었습니다','tok');
  go('sch');
}

function showNewMonthMo(){
  const months=Object.keys(RAW).sort();
  const lastMk=months[months.length-1];
  const [ly,lm]=lastMk.split('-').map(Number);
  const ny=lm===12?ly+1:ly, nm=lm===12?1:lm+1;
  const newMk=`${ny}-${String(nm).padStart(2,'0')}`;
  if(RAW[newMk]){toast('이미 '+newMk+' 스케줄이 존재합니다','terr');return;}

  const oi=getMonthOffInfo(newMk);
  const siteOpts=Object.entries(SITES).filter(([k])=>k!=='OFF'&&k!=='연차').map(([k,v])=>`<option value="${k}">${v.l}</option>`).join('');

  // 이전달 기준 개인별 OFF 요일 + 주 근무지 추정
  const srcData=RAW[lastMk]||{};
  const [sy,sm]=lastMk.split('-').map(Number);
  const srcLast=new Date(sy,sm,0).getDate();
  const empDefaults=EMP.map((_,ei)=>{
    const dowOff=new Set();
    const siteCnt={};
    for(let d=1;d<=srcLast;d++){
      const dow=new Date(sy,sm-1,d).getDay();
      const code=(srcData[d]&&srcData[d][ei])||'OFF';
      if(code==='OFF'||code==='연차')dowOff.add(dow);
      else siteCnt[code]=(siteCnt[code]||0)+1;
    }
    const topSite=Object.entries(siteCnt).sort((a,b)=>b[1]-a[1])[0];
    return {offDays:[...dowOff],site:topSite?topSite[0]:'B'};
  });

  const dowLabels=['일','월','화','수','목','금','토'];
  let empRows=EMP.map((emp,ei)=>{
    const def=empDefaults[ei];
    const checks=dowLabels.map((dl,di)=>{
      const checked=def.offDays.includes(di)?'checked':'';
      return `<td style="text-align:center"><input type="checkbox" class="nm-off" data-ei="${ei}" data-dow="${di}" ${checked} style="width:18px;height:18px;accent-color:var(--tl)"></td>`;
    }).join('');
    return `<tr>
      <td style="white-space:nowrap"><div style="display:flex;align-items:center;gap:5px">
        <div class="av ${emp.c}" style="width:22px;height:22px;font-size:9px">${emp.av}</div>
        <span style="font-size:12px;font-weight:700">${emp.n}</span>
      </div></td>
      ${checks}
      <td><select class="fc nm-site" data-ei="${ei}" style="font-size:11px;padding:4px 6px;min-width:70px">${siteOpts.replace(`value="${def.site}"`,'value="'+def.site+'" selected')}</select></td>
    </tr>`;
  }).join('');

  showGenMo(
    `📅 ${newMk} 스케줄 생성`,
    `<div style="background:rgba(107,114,128,.1);border-radius:8px;padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px">
       <span style="font-size:12px;font-weight:800;color:var(--lt)">휴무일 <span style="color:var(--tl)">${oi.total}일</span></span>
       <span style="font-size:10px;color:var(--lt4)">주말 ${oi.wkend}일${oi.holiday?` + 공휴일 ${oi.holiday}일`:''}</span>
     </div>
     ${oi.holNames.length?`<div style="font-size:10px;color:#fbbf24;margin-bottom:10px">📌 ${oi.holNames.join(', ')}</div>`:''}
     <div class="ib" style="margin-bottom:10px">체크한 요일 = OFF · 공휴일 자동 OFF · 나머지 = 근무지 배치</div>
     <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
       <table style="width:100%;font-size:11px;border-collapse:collapse">
         <thead><tr style="background:rgba(255,255,255,.05)">
           <th style="text-align:left;padding:6px 4px">팀원</th>
           ${dowLabels.map((dl,i)=>`<th style="text-align:center;padding:6px 2px;color:${i===0?'#f87171':i===6?'var(--tl)':'var(--lt4)'}">${dl}</th>`).join('')}
           <th style="text-align:left;padding:6px 4px">근무지</th>
         </tr></thead>
         <tbody>${empRows}</tbody>
       </table>
     </div>`,
    `<button class="btn btn-g" style="flex:1" onclick="closeAllMo()">취소</button>
     <button class="btn btn-p" style="flex:1" onclick="createNewMonth('${newMk}')">생성</button>`
  );
}

async function createNewMonth(newMk){
  // 모달에서 선택값 수집
  const empOff=EMP.map((_,ei)=>{
    const offs=new Set();
    document.querySelectorAll(`.nm-off[data-ei="${ei}"]:checked`).forEach(cb=>offs.add(+cb.dataset.dow));
    return offs;
  });
  const empSite=EMP.map((_,ei)=>{
    const sel=document.querySelector(`.nm-site[data-ei="${ei}"]`);
    return sel?sel.value:'B';
  });

  const [y,m]=newMk.split('-').map(Number);
  const last=new Date(y,m,0).getDate();
  const rows=[];
  RAW[newMk]={};
  for(let d=1;d<=last;d++){
    const dow=new Date(y,m-1,d).getDay();
    const ds=`${newMk}-${String(d).padStart(2,'0')}`;
    const isHoliday=!!KR_HOLIDAYS[ds];
    RAW[newMk][d]=[];
    for(let ei=0;ei<EMP.length;ei++){
      const isOff=empOff[ei].has(dow)||isHoliday;
      const code=isOff?'OFF':empSite[ei];
      RAW[newMk][d][ei]=code;
      rows.push({month_key:newMk,day:d,employee_id:EMP[ei].id,site_code:code});
    }
  }
  const{error}=await sb.from('schedules').upsert(rows,{onConflict:'month_key,day,employee_id'});
  if(error){toast('❌ 생성 실패: '+error.message,'terr');delete RAW[newMk];return;}
  calMo=newMk;
  closeAllMo();
  toast('✅ '+newMk+' 스케줄이 생성되었습니다','tok');
  go('sch');
}

async function submitLv(){
  const isAdmin=curUser.role==='admin';
  const ei=isAdmin?+document.getElementById('lv-emp').value:curUser.empIdx;
  const type=document.getElementById('lv-type').value;
  const s=document.getElementById('lv-s').value;
  const e=document.getElementById('lv-e').value;
  const r=document.getElementById('lv-r').value;
  if(!r){toast('사유를 입력해주세요','terr');return;}
  const days=type==='반차'?.5:Math.max(1,Math.ceil((new Date(e)-new Date(s))/864e5)+1);
  const emp=EMP[ei];
  const{data:ins,error}=await sb.from('leave_requests').insert({employee_id:emp.id,emp_name:emp.n,leave_type:type,start_date:s,end_date:e,days,reason:r,status:'pending'}).select().single();
  if(error){toast('❌ 신청 실패: '+error.message,'terr');return;}
  lvReqs.push({id:ins.id,empId:emp.id,en:emp.n,type,s,e,days,r,st:'pending',cr:TODAY});
  closeAllMo(); toast('✅ 연차 신청이 완료되었습니다','tok'); go(curPage);
}

// ═══ EVENT MANAGEMENT ═════════════════════════
function showEventMo(editDate=''){
  const defS=editDate||TODAY;
  showGenMo(
    '📌 일정/행사 등록',
    `<div class="fg"><label class="fl">일정명</label><input type="text" class="fc" id="ev-name" placeholder="행사명 입력"></div>
     <div class="fr">
       <div class="fg"><label class="fl">시작일</label><input type="date" class="fc" id="ev-s" value="${defS}"></div>
       <div class="fg"><label class="fl">종료일</label><input type="date" class="fc" id="ev-e" value="${defS}"></div>
     </div>
     <div class="ib" style="margin-top:4px">💡 기간을 지정하면 해당 기간의 모든 날짜에 일정이 등록됩니다.<br>직원들의 개인 스케줄에 자동으로 표시됩니다.</div>`,
    `<button class="btn btn-g" style="flex:1" onclick="closeAllMo()">취소</button>
     <button class="btn btn-p" style="flex:1" onclick="submitEvent()">등록</button>`
  );
}

async function submitEvent(){
  const name=document.getElementById('ev-name').value.trim();
  const s=document.getElementById('ev-s').value;
  const e=document.getElementById('ev-e').value;
  if(!name){toast('일정명을 입력해주세요','terr');return;}
  if(!s||!e){toast('날짜를 선택해주세요','terr');return;}
  if(e<s){toast('종료일이 시작일보다 빠릅니다','terr');return;}
  const sd=new Date(s),ed=new Date(e);
  const rows=[];
  for(let d=new Date(sd);d<=ed;d.setDate(d.getDate()+1)){
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    rows.push({event_date:ds,event_name:name});
    EVENTS[ds]=name;
  }
  const{error}=await sb.from('events').upsert(rows,{onConflict:'event_date'});
  if(error){toast('❌ 등록 실패: '+error.message,'terr');return;}
  closeAllMo(); toast('✅ 일정이 등록되었습니다','tok'); go(curPage);
}

async function deleteEvent(ds){
  const ev=EVENTS[ds];
  if(!ev)return;
  const dates=Object.keys(EVENTS).filter(k=>EVENTS[k]===ev);
  const{error}=await sb.from('events').delete().in('event_date',dates);
  if(error){toast('❌ 삭제 실패','terr');return;}
  dates.forEach(k=>delete EVENTS[k]);
  toast('🗑 일정이 삭제되었습니다','tok'); go(curPage);
}

document.addEventListener('DOMContentLoaded',async()=>{
  const src=`data:image/png;base64,${LOGO_B64}`;

          av:prof.avatar,c:prof.color_class};
        document.getElementById('s-login').classList.remove('active');
        document.getElementById('s-app').classList.add('active');
        initApp();
      }
    }
  }catch(e){console.error('Auto-login failed:',e);}
